<header class="header">

  <!-- Logo -->
  <div class="logo">Le Calao Doré</div>

  <!-- Bouton burger (visible seulement sur mobile via CSS) -->
  <button class="burger" (click)="toggleMenu()">☰</button>

  <!-- Navbar -->
  @if (isMenuOpen) {
    <nav class="nav-mobile">
      @for (link of links; track link) {
        <a [class.active]="activeLink === link"
           (click)="setActive(link)">
          {{ link }}
        </a>
      }
    </nav>
  }

  <!-- Navbar desktop (toujours visible) -->
  <nav class="nav-desktop">
    @for (link of links; track link) {
      <a [class.active]="activeLink === link"
         (click)="setActive(link)">
        {{ link }}
      </a>
    }
  </nav>

</header>
