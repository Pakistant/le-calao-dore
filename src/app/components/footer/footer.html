<footer   id="contact" class="footer py-5">
  <div class="container">
    <div class="row">

      <!-- Colonne 1 : Coordonnées -->
      <div class="col-12 col-md-4 mb-4">
        <h5>Le Calao Doré</h5>
        <p class="bi bi-geo-alt-fill">  Rue Soudanaise, Akwa — Douala</p>
        <p class="bi bi-telephone">  +237 6XX XX XX XX</p>
        <p class="bi bi-envelope">   contact@calao-dore.cm</p>
      </div>

      <!-- Colonne 2 : Réseaux sociaux -->
      <div class="col-12 col-md-4 mb-4">
        <h5>Suivez-nous</h5>
        @for (r of reseaux; track r.nom) {
          <a [href]="r.url" class="reseau-link">
           <i [class]="r.icone"></i> {{ r.nom }}
          </a>
        }
      </div>

      <!-- Colonne 3 : Liens rapides -->
      <div class="col-12 col-md-4 mb-4">
        <h5>Navigation</h5>
        <ul class="list-unstyled">
          @for (lien of liens; track lien) {
            <li>
              <a [href]="'#' + lien.toLowerCase()">
                {{ lien }}
              </a>
            </li>
          }
        </ul>
      </div>

    </div>

    <!-- Séparateur -->
    <hr class="separateur">

    <!-- Copyright dynamique -->
    <p class="text-center copyright mb-0">
      © {{ annee }} Le Calao Doré — Tous droits réservés
    </p>

  </div>
</footer>
